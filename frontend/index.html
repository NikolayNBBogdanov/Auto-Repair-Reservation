<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Repair Shop - Reservierungssystem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-brand">
                <h1>🔧 Auto Repair Shop</h1>
            </div>
            <div class="navbar-menu">
                <button class="nav-btn active" onclick="showSection('dashboard')">Dashboard</button>
                <button class="nav-btn" onclick="showSection('reservations')">Reservierungen</button>
                <button class="nav-btn" onclick="showSection('new-reservation')">Neue Reservierung</button>
                <button class="nav-btn" onclick="showSection('customers')">Kunden</button>
            </div>
        </nav>

        <!-- Dashboard Section -->
        <section id="dashboard" class="section active">
            <h2>Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Gesamtkunden</h3>
                    <p class="stat-number" id="stat-customers">0</p>
                </div>
                <div class="stat-card">
                    <h3>Reservierungen</h3>
                    <p class="stat-number" id="stat-reservations">0</p>
                </div>
                <div class="stat-card">
                    <h3>Bestätigt</h3>
                    <p class="stat-number" id="stat-confirmed">0</p>
                </div>
                <div class="stat-card">
                    <h3>Storniert</h3>
                    <p class="stat-number" id="stat-cancelled">0</p>
                </div>
            </div>

            <div class="services-section">
                <h3>Unsere Services</h3>
                <div id="services-list" class="services-grid"></div>
            </div>
        </section>

        <!-- Reservations Section -->
        <section id="reservations" class="section">
            <h2>Reservierungen</h2>
            <div id="reservations-list" class="reservations-table"></div>
        </section>

        <!-- New Reservation Section -->
        <section id="new-reservation" class="section">
            <h2>Neue Reservierung erstellen</h2>
            <form id="reservation-form" class="form-container">
                <div class="form-group">
                    <label>Kundenname *</label>
                    <input type="text" id="customer-name" placeholder="Max Müller" required>
                </div>

                <div class="form-group">
                    <label>Telefon *</label>
                    <input type="tel" id="customer-phone" placeholder="0123456789" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="customer-email" placeholder="max@example.com">
                </div>

                <div class="form-group">
                    <label>Service *</label>
                    <select id="service-select" required>
                        <option value="">-- Wählen Sie einen Service --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Reservierungsdatum *</label>
                    <input type="date" id="reservation-date" required>
                </div>

                <div class="form-group">
                    <label>Zeitfenster *</label>
                    <select id="time-slot" required>
                        <option value="">-- Wählen Sie einen Zeitslot --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Notizen</label>
                    <textarea id="reservation-notes" placeholder="Zusätzliche Informationen..." rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Reservierung erstellen</button>
                <div id="form-message" class="message"></div>
            </form>
        </section>

        <!-- Customers Section -->
        <section id="customers" class="section">
            <h2>Kundenverwaltung</h2>
            <div id="customers-list" class="customers-table"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
