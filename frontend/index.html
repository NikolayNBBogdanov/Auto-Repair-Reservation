<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Repair Shop - Reservation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-brand">
                <h1>🔧 Auto Repair Shop</h1>
            </div>
            <div class="navbar-menu">
                <button class="nav-btn active" onclick="showSection('dashboard')">Dashboard</button>
                <button class="nav-btn" onclick="showSection('reservations')">Reservations</button>
                <button class="nav-btn" onclick="showSection('new-reservation')">New Reservation</button>
                <button class="nav-btn" onclick="showSection('customers')">Customers</button>
            </div>
        </nav>

        <!-- Dashboard Section -->
        <section id="dashboard" class="section active">
            <h2>Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Customers</h3>
                    <p class="stat-number" id="stat-customers">0</p>
                </div>
                <div class="stat-card">
                    <h3>Reservations</h3>
                    <p class="stat-number" id="stat-reservations">0</p>
                </div>
                <div class="stat-card">
                    <h3>Confirmed</h3>
                    <p class="stat-number" id="stat-confirmed">0</p>
                </div>
                <div class="stat-card">
                    <h3>Cancelled</h3>
                    <p class="stat-number" id="stat-cancelled">0</p>
                </div>
            </div>

            <div class="services-section">
                <h3>Our Services</h3>
                <div id="services-list" class="services-grid"></div>
            </div>
        </section>

        <!-- Reservations Section -->
        <section id="reservations" class="section">
            <h2>Reservations</h2>
            <div id="reservations-list" class="reservations-table"></div>
        </section>

        <!-- New Reservation Section -->
        <section id="new-reservation" class="section">
            <h2>Create New Reservation</h2>
            <form id="reservation-form" class="form-container">
                <div class="form-group">
                    <label>Existing Customer</label>
                    <select id="customer-select">
                        <option value="">-- Add new customer --</option>
                    </select>
                    <small style="display: block; margin-top: 6px; color: #666;">Choose an existing customer or leave this empty to add a new one.</small>
                </div>

                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customer-name" placeholder="John Smith">
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="customer-phone" placeholder="0123456789">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="customer-email" placeholder="max@example.com">
                </div>

                <div class="form-group">
                    <label>Service *</label>
                    <select id="service-select" required>
                        <option value="">-- Select a service --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Reservation Date *</label>
                    <input type="date" id="reservation-date" required>
                </div>

                <div class="form-group">
                    <label>Time Slot *</label>
                    <select id="time-slot" required>
                        <option value="">-- Select a time slot --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="reservation-notes" placeholder="Additional information..." rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Create Reservation</button>
                <div id="form-message" class="message"></div>
            </form>
        </section>

        <!-- Customers Section -->
        <section id="customers" class="section">
            <h2>Customer Management</h2>
            <div id="customers-list" class="customers-table"></div>

            <div class="form-container" style="margin-top: 20px;">
                <h3 id="customer-form-title">Edit Customer</h3>
                <form id="customer-edit-form">
                    <input type="hidden" id="customer-id">
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="edit-customer-name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="edit-customer-phone" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="edit-customer-email">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" class="btn btn-secondary" onclick="cancelCustomerEdit()">Cancel</button>
                    </div>
                    <div id="customer-form-message" class="message"></div>
                </form>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
